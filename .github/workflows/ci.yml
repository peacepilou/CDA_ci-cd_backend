name: CI Pipeline for Spring Boot

on:
  push:
    branches-ignore:
      - staging
      - production
      - development

  pull_request:
    branches:
      - development
      - staging
      - production

jobs:
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Run unit tests
        run: mvn test -Punit-tests

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Run integration tests
        run: mvn test -Pintegration-tests

  e2e-tests:
    name: 🚀 E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'staging' || github.base_ref == 'production')
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
      - name: Copy .env
        run: cp .env.ci.e2e .env
      - name: Docker Compose up
        run: docker compose -f docker-compose.e2e.yml --env-file .env up -d
      - name: Wait for DB
        run: sleep 25
      - name: Run E2E tests
        run: mvn test -Pe2e-tests
      - name: Docker Compose down
        run: docker compose -f docker-compose.e2e.yml down --volumes