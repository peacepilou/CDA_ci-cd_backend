name: CI Pipeline for Spring Boot

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - development
      - staging
      - production

jobs:
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Run unit tests
        run: mvn test -Punit-tests

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Run integration tests
        run: mvn test -Pintegration-tests

  e2e-tests:
    name: 🚀 E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/production'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy .env.ci to .env
        run: cp .env.ci .env

      - name: Set up Docker Compose for E2E
        run: docker-compose -f docker-compose.e2e.yml up -d

      - name: Wait for services
        run: sleep 25

      - name: Run E2E tests
        run: mvn test -Pe2e-tests

      - name: Shut down Docker Compose
        run: docker-compose -f docker-compose.e2e.yml down --volumes
