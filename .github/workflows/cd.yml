name: Deploy to VPS (staging or production)

on:
  push:
    branches:
      - staging
      - production

env:
  IMAGE_NAME: peacepilou/spring-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          TAG=${GITHUB_REF##*/}
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG

      - name: Deploy to VPS
        run: |
          TAG=${GITHUB_REF##*/}
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /home/${{ secrets.VPS_USER }}/backend/$TAG &&
            docker compose pull &&
            docker compose up -d
          "

      - name: Done
        run: echo "App deployed to ${{ github.ref_name }}"