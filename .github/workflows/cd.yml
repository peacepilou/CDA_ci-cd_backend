name: CD Pipeline for Spring Boot

on:
  push:
    branches:
      - staging
      - production

jobs:
  deploy:
    name: 🚀 Deploy to DockerHub + VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set Docker image tag
        id: image_tag
        run: |
          if [[ "${GITHUB_REF##*/}" == "production" ]]; then
            echo "tag=production" >> "$GITHUB_OUTPUT"
          else
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: peacepilou/spring-app:${{ steps.image_tag.outputs.tag }}

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PRIVATE_KEY_CD_STAGING }}" > ~/.ssh/id_ed25519_staging
          chmod 600 ~/.ssh/id_ed25519_staging

      - name: 🔐 Deploy to VPS via SSH
        run: |
          TAG=${{ steps.image_tag.outputs.tag }}
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519_staging ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            cd /home/${{ secrets.VPS_USER }}/backend/$TAG
            docker compose pull
            docker compose up -d
          EOF

      - name: Clean SSH key
        run: rm -f ~/.ssh/id_ed25519_staging
